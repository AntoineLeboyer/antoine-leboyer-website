<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Antoine Leboyer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 3.5rem; margin-bottom: 1.5rem; }
    h1 { font-size: 2.2rem; margin-bottom: 1rem; }
    p  { color: rgba(255,255,255,0.65); max-width: 420px; line-height: 1.7; margin-bottom: 2rem; }
    a {
      display: inline-block;
      background: #c9973a;
      color: #fff;
      padding: 0.75rem 2rem;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.2s;
    }
    a:hover { background: #b5852e; }
  </style>
</head>
<body>
  <div class="icon">✉️</div>
  <h1>Message received!</h1>
  <p>Thank you for reaching out. Antoine will get back to you shortly.</p>
  <a href="/">← Back to the site</a>
</body>
</html>
